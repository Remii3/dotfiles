set -g default-terminal "tmux-256color"

# mouse support
set -g mouse on

# faster escape
set -sg escape-time 0

# history
set -g history-limit 100000

##### Prefix #####

# change prefix from C-b to C-a (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Splits #####

# split like vim
unbind '"'
unbind %

# stay in same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Resize #####

bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

##### Reload #####

bind r source-file ~/dotfiles/tmux/.config/tmux/tmux.conf \; display "tmux config reloaded"

##### Status bar (minimal, clean) #####

set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-style bg=default,fg=colour7
set -g message-style bg=default,fg=colour7

set -g status-left ""
set -g status-right "#[fg=colour4]#H #[fg=colour8]| %Y-%m-%d %H:%M "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bold] #I:#W "

##### Copy mode (vim keys) #####

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

##### Quality of life #####

# don't rename windows automatically
set -g allow-rename off

# start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Vim like navigation
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
