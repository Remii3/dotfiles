[window]
padding = { x = 12, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.95
blur = true
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
size = 16.0

[cursor]
style = { shape = "Block", blinking = "Never" }

[selection]
save_to_clipboard = false

# -----------------------------------------------------------------------------
# TokyoNight Alacritty Colors
# Theme: Tokyo Night Moon
# Upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/alacritty/tokyonight_moon.toml
# -----------------------------------------------------------------------------

# Default colors
[colors.primary]
background = '#222436'
foreground = '#c8d3f5'

# Normal colors
[colors.normal]
black = '#1b1d2b'
red = '#ff757f'
green = '#c3e88d'
yellow = '#ffc777'
blue = '#82aaff'
magenta = '#c099ff'
cyan = '#86e1fc'
white = '#828bb8'

# Bright colors
[colors.bright]
black = '#444a73'
red = '#ff8d94'
green = '#c7fb6d'
yellow = '#ffd8ab'
blue = '#9ab8ff'
magenta = '#caabff'
cyan = '#b2ebff'
white = '#c8d3f5'
