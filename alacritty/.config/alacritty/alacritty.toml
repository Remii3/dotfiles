[window]
padding = { x = 12, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.95
blur = true
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
size = 16.0

[cursor]
style = { shape = "Block", blinking = "Never" }

[selection]
save_to_clipboard = false

[colors.primary]
background = "#1f1f1f"
foreground = "#cccccc"

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.selection]
text = "#e0e0e0"
background = "#3a3d41"

[colors.normal]
black = "#272727"
red = "#f74949"
green = "#2ea043"
yellow = "#9e6a03"
blue = "#0078d4"
magenta = "#d01273"
cyan = "#1db4d6"
white = "#cccccc"

[colors.bright]
black = "#5d5d5d"
red = "#dc5452"
green = "#23d18b"
yellow = "#f5f543"
blue = "#3b8eea"
magenta = "#d670d6"
cyan = "#29b8db"
white = "#e5e5e5"

# Ghostty-specific settings without direct Alacritty equivalents:
# font-thicken = true, font-thicken-strength = 100
# background-blur = 200 (Alacritty supports only blur = true/false)
# shell-integration-features = no-cursor
